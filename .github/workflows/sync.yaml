name: Direct Sync to Docs
on:
  push:
    branches: [main]
    paths: ['api/openapi.yaml']
  workflow_dispatch:
    inputs:
      reason:
        description: "Why are you running this sync manually?"
        required: true

jobs:
  sync:
    uses: abcdeafasdfasdf/doc/.github/workflows/remote-sync-logic.yaml@main
    with:
      service_name: "api-service"
      spec_path: "/account/travellers"
      source_file: "api/openapi.yaml"
    secrets:
      APP_ID: ${{ secrets.APP_ID }}
      APP_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY }}
